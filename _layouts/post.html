---
layout: default
---

<article class="post">

  <div class="terminal-line">
    testunz@diario:~$ cat {{ page.slug }}.md
  </div>

  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      {{ page.date | date: "%d %B %Y" }}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
