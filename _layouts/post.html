---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      <span>{{ page.slug }}.md</span>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
