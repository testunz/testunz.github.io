---
layout: default
---

<article class="post">
  <a class="back-link" href="{{ '/articoli/' | relative_url }}">testunz@diario:~$ cd articoli</a>

  <div class="terminal-line">
    testunz@diario:~$ less {{ page.slug | default: page.title | slugify: "latin" }}.md
  </div>

  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      {{ page.date | date: "%d %B %Y" }}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}">Torna alla home</a>
  </footer>
</article>
